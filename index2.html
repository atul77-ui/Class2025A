<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dev Profile Card</title>
    <link rel="stylesheet" href="style2.css" />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
</head>

<body>
    <div class="card">
        <div class="avatar-wrapper">
            <img
                src="https://images.unsplash.com/photo-1536104968055-4d61aa56f46a?q=80&w=1160&auto=format&fit=crop"
                alt="Ismt Dev Profile Photo"
            />
        </div>

        <h1 class="dev-name">Ismt Dev</h1>
        <p class="dev-title">Full Stack Developer</p>

        <div class="divider"></div>

        <div class="skills-wrapper">
            <span class="skill-tag">React</span>
            <span class="skill-tag">JavaScript</span>
            <span class="skill-tag">HTML &amp; CSS</span>
            <span class="skill-tag">Git</span>
        </div>

        <div class="divider-bottom"></div>

        <img
            class="qr-code"
            src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://github.com/atul77-ui/My-CV"
            alt="QR Code to connect with Ismt Dev"
        />

        <p class="qr-label">Scan to Connect</p>

    </div>
</body>
</html>
